<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>KNU80TH 레볼루션 부스</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    
    <style>
      /* 1. 하단 푸터 숨기기 */
      #unity-footer { display: none !important; }
      
      /* 2. 배경 및 화면 정렬 (완벽한 중앙 정렬 강제) */
      body {
        margin: 0 !important;
        padding: 0 !important;
        background-color: #222C36 !important; 
        display: flex !important;
        justify-content: center !important;
        align-items: center !important;
        width: 100vw !important;
        height: 100vh !important;
        overflow: hidden !important;
      }

      /* 3. 컨테이너 9:16 비율 고정 및 위치 강제 초기화 */
      #unity-container {
        position: relative !important;
        left: auto !important;
        top: auto !important;
        transform: none !important;
        margin: 0 !important;
        
        height: 100% !important;
        width: auto !important;
        aspect-ratio: 9 / 16 !important;
        
        max-width: 1080px !important; 
        max-height: 1920px !important;
        background-color: #1a1a1a !important; 
      }

      /* 4. 캔버스 영역 꽉 채우기 */
      #unity-canvas {
        width: 100% !important;
        height: 100% !important;
        object-fit: contain !important;
      }

      /* 5. 커스텀 로고 크기 및 비율 강제 조정 */
      #unity-logo {
        width: 300px !important;  
        height: 300px !important; 
        background-size: contain !important; 
        background-position: center !important;
        background-repeat: no-repeat !important;
        margin: 0 !important; 
      }

      /* 6. 로딩 영역 완벽한 가운데 정렬 */
      #unity-loading-bar {
        position: absolute !important;
        top: 50% !important;
        left: 50% !important;
        transform: translate(-50%, -50%) !important;
        display: flex; 
        flex-direction: column !important; 
        align-items: center !important; 
        justify-content: center !important;
      }

      /* 7. 로딩 바 껍데기(빈 상자) 테두리 디자인 */
      #unity-progress-bar-empty {
        width: 200px !important;      
        height: 15px !important;       
        margin-top: 30px !important;  
        border: 2px solid white !important; 
        background: transparent !important; 
        position: relative !important;
        overflow: hidden !important;  
      }

      /* 8. 로딩 바 알맹이(채워지는 부분) 정확한 위치 고정 */
      #unity-progress-bar-full {
        height: 100% !important; 
        background-color: white !important; 
        margin: 0 !important;
        padding: 0 !important;
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
        transform: none !important; 
      }
    </style>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=1080 height=1920 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">KnuFestival</div>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/웹 3.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/웹 3.data",
        frameworkUrl: buildUrl + "/웹 3.framework.js",
        codeUrl: buildUrl + "/웹 3.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "KnuFestival",
        productVersion: "0.1.0",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";
      }

      document.querySelector("#unity-loading-bar").style.display = "flex";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
              }).then((unityInstance) => {
                document.querySelector("#unity-loading-bar").style.display = "none";
                document.querySelector("#unity-fullscreen-button").onclick = () => {
                  unityInstance.SetFullscreen(1);
                };
              }).catch((message) => {
                alert(message);
              });
            };

      document.body.appendChild(script);
    </script>
    
    <div id="visitor-counter" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999;">
      <a href="https://hits.seeyoufarm.com">
        <img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https%3A%2F%2FREVOLUTION-KNU.github.io%2FKNU80thFestival%2F&count_bg=%23FF5722&title_bg=%23222C36&icon=&icon_color=%23E7E7E7&title=VISITORS&edge_flat=true" alt="Hits"/>
      </a>
    </div>
    </body>
</html>
